<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0b;
      --bg-surface: #111113;
      --bg-elevated: #1a1a1e;
      --bg-card: #16161a;
      --amber: #e8a828;
      --amber-hot: #f0c040;
      --amber-dim: #b8841c;
      --amber-glow: rgba(232, 168, 40, 0.15);
      --red: #e05040;
      --blue: #4da6ff;
      --text-primary: #e8e6e1;
      --text-secondary: #9a9590;
      --text-dim: #5a5550;
      --border: #2a2a2e;
      --border-subtle: #1e1e22;
      --font: 'Space Grotesk', system-ui, sans-serif;
      --radius: 4px;
      --radius-lg: 6px;
      --transition: 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
      padding: 16px;
      font-size: 13px;
      line-height: 1.4;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
      user-select: none;
    }
    .header__logo {
      width: 24px;
      height: 24px;
      cursor: default;
      transition: filter var(--transition);
    }
    .header__logo.flash {
      filter: drop-shadow(0 0 8px var(--amber));
    }
    .header__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .header__sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .header__version {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; gap: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .tab-btn {
      flex: 1; padding: 8px 4px;
      background: none; border: none;
      color: var(--text-dim); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font);
      border-bottom: 2px solid transparent;
      transition: color var(--transition);
      letter-spacing: 0.02em;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Dev mode ── */
    body:not(.dev-mode) .dev-only { display: none; }

    body.dev-mode .header__sub::after {
      content: ' / dev';
      color: var(--amber-dim);
    }

    /* ── Sections ── */
    .section {
      padding: 10px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
    }
    .section__label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      font-weight: 500;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
    }
    .toggle-row__label { font-size: 13px; font-weight: 500; }

    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--border); border-radius: 22px;
      transition: background var(--transition);
    }
    .slider:before {
      content: ''; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: var(--text-dim); border-radius: 50%;
      transition: transform var(--transition), background var(--transition);
    }
    input:checked + .slider { background: var(--amber); }
    input:checked + .slider:before { transform: translateX(18px); background: var(--bg-deep); }

    /* ── Style controls ── */
    .style-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .style-row .section__label { flex: 0 0 60px; margin-bottom: 0; }
    .style-row input[type="range"] {
      flex: 1; accent-color: var(--amber); height: 4px;
    }
    .style-row .style-value {
      flex: 0 0 36px; text-align: right;
      font-size: 11px; color: var(--text-dim);
    }
    .style-row input[type="color"] {
      width: 28px; height: 22px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; cursor: pointer; padding: 0;
    }
    .style-row select {
      flex: 1; padding: 4px 8px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-deep); color: var(--text-primary);
      font-size: 12px; font-family: var(--font); outline: none;
      transition: border-color var(--transition);
    }
    .style-row select:focus { border-color: var(--amber-dim); }
    .style-row select option { background: var(--bg-deep); }
    .style-reset {
      background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 2px 6px; cursor: pointer;
      font-size: 10px; color: var(--text-dim); font-family: var(--font);
      transition: color var(--transition), border-color var(--transition);
    }
    .style-reset:hover { color: var(--text-primary); border-color: var(--text-dim); }

    /* ── Drop zone (dev) ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 16px; text-align: center;
      font-size: 13px; color: var(--text-dim);
      margin-bottom: 10px; cursor: pointer;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }
    .drop-zone:hover { border-color: var(--text-dim); color: var(--text-secondary); }
    .drop-zone.dragover {
      border-color: var(--amber);
      background: var(--amber-glow);
      color: var(--amber);
    }
    .drop-zone.loading {
      border-color: var(--blue); color: var(--blue);
      pointer-events: none;
    }
    .drop-zone.success { border-color: var(--amber); color: var(--amber); }
    .drop-zone.error { border-color: var(--red); color: var(--red); }

    /* ── Queue (dev) ── */
    .queue-section {
      padding: 10px 12px;
      background: rgba(232, 168, 40, 0.04);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      border: 1px solid rgba(232, 168, 40, 0.1);
    }
    .queue-section .section__label { color: var(--amber-dim); }
    .queue-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; font-size: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .queue-item:last-child { border-bottom: none; }
    .queue-status {
      font-size: 10px; font-weight: 600; padding: 2px 6px;
      border-radius: 2px; text-transform: uppercase; white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .queue-status.pending { background: rgba(232, 168, 40, 0.15); color: var(--amber); }
    .queue-status.running { background: rgba(77, 166, 255, 0.15); color: var(--blue); }
    .queue-title {
      flex: 1; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: var(--text-secondary);
    }
    .queue-progress { color: var(--text-dim); font-size: 11px; white-space: nowrap; }

    /* ── Translations list ── */
    .translations-list { list-style: none; }
    .translation-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius);
      margin-bottom: 2px;
      font-size: 12px;
      background: transparent;
      transition: background var(--transition);
    }
    .translation-item:hover { background: var(--bg-elevated); }
    .translation-title {
      flex: 1; color: var(--text-secondary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    a.translation-link {
      text-decoration: none;
      color: var(--text-secondary);
      transition: color var(--transition);
    }
    a.translation-link:hover { color: var(--amber); }
    .translation-model {
      color: var(--amber); font-size: 10px; font-weight: 500;
      padding: 1px 6px; border-radius: 2px;
      background: var(--amber-glow);
      white-space: nowrap; letter-spacing: 0.02em;
    }
    .translation-date {
      color: var(--text-dim); font-size: 11px; white-space: nowrap;
    }

    .site-link {
      display: block; text-align: center;
      margin-top: 10px; padding: 8px;
      font-size: 12px; font-weight: 500; font-family: var(--font);
      color: var(--amber);
      text-decoration: none;
      border: 1px solid rgba(232, 168, 40, 0.2);
      border-radius: var(--radius-lg);
      transition: background var(--transition), border-color var(--transition);
    }
    .site-link:hover {
      background: var(--amber-glow);
      border-color: rgba(232, 168, 40, 0.35);
    }

    .state-message {
      text-align: center; padding: 20px 10px;
      color: var(--text-dim); font-size: 13px;
    }
    .state-message.error { color: var(--red); }

    /* ── Hint ── */
    .hint {
      font-size: 11px; color: var(--text-dim); line-height: 1.5;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border-subtle);
    }

    /* ── Settings (dev) ── */
    .provider-options { display: flex; flex-direction: column; gap: 4px; }
    .provider-option {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; cursor: pointer;
    }
    .provider-option input { accent-color: var(--amber); }
    .hint-text { color: var(--text-dim); font-size: 11px; }

    .key-row { display: flex; gap: 4px; }
    .key-input {
      flex: 1; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-deep); color: var(--text-primary);
      font-size: 12px; font-family: var(--font); outline: none;
      transition: border-color var(--transition);
    }
    .key-input:focus { border-color: var(--amber-dim); }
    .key-toggle {
      background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3px 8px; cursor: pointer; font-size: 13px;
      transition: border-color var(--transition);
    }
    .key-toggle:hover { border-color: var(--text-dim); }

    .model-select {
      width: 100%; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-deep); color: var(--text-primary);
      font-size: 12px; font-family: var(--font); outline: none;
      transition: border-color var(--transition);
    }
    .model-select:focus { border-color: var(--amber-dim); }
    .model-select option { background: var(--bg-deep); }

    .status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px; border-radius: var(--radius-lg);
      margin-bottom: 12px; font-size: 13px;
    }
    .status-ok { background: rgba(232, 168, 40, 0.08); color: var(--amber); }
    .status-err { background: rgba(224, 80, 64, 0.08); color: var(--red); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: var(--amber); }
    .dot-red { background: var(--red); }

    /* ── Target language selector ── */
    .lang-select {
        width: 100%; padding: 6px 10px;
        border: 1px solid var(--border); border-radius: var(--radius);
        background: var(--bg-deep); color: var(--text-primary);
        font-size: 13px; font-family: var(--font); outline: none;
        transition: border-color var(--transition);
    }
    .lang-select:focus { border-color: var(--amber-dim); }
    .lang-select option { background: var(--bg-deep); }
  </style>
</head>
<body>
  <!-- ── Header ── -->
  <div class="header">
    <svg class="header__logo" id="headerLogo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" rx="6" fill="#141414"/><rect x="7" y="12" width="12" height="1" rx="0.5" fill="#999"/><rect x="7" y="17" width="18" height="2" rx="1" fill="#e8a828"/></svg>
    <div>
      <div class="header__title" data-i18n="headerTitle"></div>
      <div class="header__sub" data-i18n="headerSub"></div>
    </div>
    <div class="header__version" id="ext-version"></div>
  </div>

  <!-- ── Tab bar ── -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="current" data-i18n="tabPlayer"></button>
    <button class="tab-btn" data-tab="api" data-i18n="tabApi"></button>
    <button class="tab-btn" data-tab="library" data-i18n="tabLibrary"></button>
    <button class="tab-btn dev-only" data-tab="wishlist" data-i18n="tabWishlist"></button>
    <button class="tab-btn dev-only" data-tab="settings" data-i18n="tabSettings"></button>
  </div>

  <!-- ═══ Tab 1: Player ═══ -->
  <div class="tab-pane active" id="tab-current">
    <div class="section" id="targetLangSection">
        <div class="section__label" data-i18n="labelTargetLang"></div>
        <select id="targetLangSelect" class="lang-select"></select>
    </div>

    <div class="toggle-row">
      <span class="toggle-row__label" data-i18n="labelTranslationEnabled"></span>
      <label class="switch">
        <input type="checkbox" id="toggleEnabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="section">
      <div class="section__label" data-i18n="labelSubtitleStyle"></div>
      <div class="style-row">
        <div class="section__label" data-i18n="labelSize"></div>
        <input type="range" id="styleFontSize" min="12" max="48" value="12" step="2">
        <span class="style-value" id="styleFontSizeVal" data-i18n="fontSizeAuto"></span>
      </div>
      <div class="style-row">
        <div class="section__label" data-i18n="labelColor"></div>
        <input type="color" id="styleColor" value="#ffffff">
        <button class="style-reset" id="styleColorReset" data-i18n="labelReset"></button>
      </div>
      <div class="style-row">
        <div class="section__label" data-i18n="labelBackground"></div>
        <input type="range" id="styleBgOpacity" min="0" max="100" value="85" step="5">
        <span class="style-value" id="styleBgOpacityVal">85%</span>
      </div>
      <div class="style-row">
        <div class="section__label" data-i18n="labelPosition"></div>
        <select id="stylePosition">
          <option value="" data-i18n="labelAuto"></option>
          <option value="bottom" data-i18n="labelBottom"></option>
          <option value="top" data-i18n="labelTop"></option>
        </select>
      </div>
    </div>

    <div class="hint" data-i18n="hintOpenVideo"></div>
  </div>

  <!-- ═══ Tab 2: API ═══ -->
  <div class="tab-pane" id="tab-api">
    <div class="section" id="apiKeySection">
      <div class="section__label" data-i18n="labelApiKey"></div>
      <div class="key-row">
        <input type="password" id="apiKeyInput" data-i18n-placeholder="placeholderApiKey" class="key-input">
        <button id="toggleKey" class="key-toggle" data-i18n-title="tooltipToggleKey">&#128065;</button>
      </div>
    </div>

    <div class="section">
      <div class="section__label" data-i18n="labelModel"></div>
      <input id="modelInput" class="key-input" list="modelHints" data-i18n-placeholder="placeholderModel" autocomplete="off" style="width:100%">
      <datalist id="modelHints"></datalist>
      <select id="modelSelect" class="model-select" style="display:none"></select>
    </div>

    <a class="site-link" href="https://openrouter.ai/keys" target="_blank" data-i18n="apiGetKey"></a>
    <a class="site-link" id="apiAltLink" href="https://polza.ai?referral=dxELJYpePd" target="_blank" style="display:none"></a>

    <div class="hint" data-i18n="apiCostHint"></div>
  </div>

  <!-- ═══ Tab 3: Library ═══ -->
  <div class="tab-pane" id="tab-library">
    <div class="drop-zone dev-only" id="dropZone" data-i18n="dropZoneDefault"></div>

    <div class="dev-only">
      <div class="queue-section" id="queueSection" style="display:none">
        <div class="section__label" data-i18n="labelQueue"></div>
        <div id="queueList"></div>
      </div>
    </div>

    <div id="translationsLoading" class="state-message" style="display:none" data-i18n="stateLoading"></div>
    <div id="translationsEmpty" class="state-message" style="display:none" data-i18n="stateNoTranslations"></div>
    <div id="translationsError" class="state-message error" style="display:none"></div>
    <div id="translationsList" class="translations-list"></div>
    <a id="siteLink" class="site-link" href="#" target="_blank" data-i18n="siteLinkAll"></a>
  </div>

  <!-- ═══ Tab 4: Wishlist (dev only) ═══ -->
  <div class="tab-pane" id="tab-wishlist">
    <div id="wishlistLoading" class="state-message" style="display:none" data-i18n="stateLoading"></div>
    <div id="wishlistEmpty" class="state-message" style="display:none" data-i18n="stateNoRequests"></div>
    <div id="wishlistList" class="translations-list"></div>
  </div>

  <!-- ═══ Tab 5: Settings (dev only) ═══ -->
  <div class="tab-pane" id="tab-settings">
    <div class="section">
      <div class="section__label" data-i18n="labelProvider"></div>
      <div class="provider-options">
        <label class="provider-option">
          <input type="radio" name="provider" value="openrouter" checked>
          <span>OpenRouter <span class="hint-text" data-i18n="providerOpenRouterHint"></span></span>
        </label>
        <label class="provider-option">
          <input type="radio" name="provider" value="claude-cli">
          <span>Claude CLI <span class="hint-text" data-i18n="providerClaudeCliHint"></span></span>
        </label>
      </div>

    </div>

    <div class="status-row" id="serverStatus" style="display:none">
      <div class="dot dot-red"></div>
      <span data-i18n="statusCheckingServer"></span>
    </div>

    <div class="section">
      <div class="section__label" data-i18n="labelSharedCache"></div>
      <div class="toggle-row" style="margin-bottom:6px; padding:0; background:none; border:none;">
        <span class="toggle-row__label" data-i18n="labelEnabled"></span>
        <label class="switch">
          <input type="checkbox" id="toggleSharedCache" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div id="sharedCacheUrlSection">
        <div class="section__label" data-i18n="labelSharedCacheApiKey"></div>
        <input type="password" id="sharedCacheApiKey" data-i18n-placeholder="placeholderCacheKey" class="key-input" style="width:100%">
      </div>
    </div>
  </div>

  <script src="providers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
