<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Space Grotesk';
      src: url('fonts/SpaceGrotesk-LatinExt.woff2') format('woff2');
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
      unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
    }
    @font-face {
      font-family: 'Space Grotesk';
      src: url('fonts/SpaceGrotesk-Latin.woff2') format('woff2');
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    :root {
      --bg-deep: #0a0a0b;
      --bg-surface: #111113;
      --bg-elevated: #1a1a1e;
      --bg-card: #16161a;
      --amber: #e8a828;
      --amber-hot: #f0c040;
      --amber-dim: #b8841c;
      --amber-glow: rgba(232, 168, 40, 0.15);
      --red: #e05040;
      --blue: #4da6ff;
      --text-primary: #e8e6e1;
      --text-secondary: #9a9590;
      --text-dim: #5a5550;
      --border: #2a2a2e;
      --border-subtle: #1e1e22;
      --font: 'Space Grotesk', system-ui, sans-serif;
      --radius: 4px;
      --radius-lg: 6px;
      --transition: 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
      padding: 16px;
      font-size: 13px;
      line-height: 1.4;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
      user-select: none;
    }
    .header__logo {
      width: 24px;
      height: 24px;
      cursor: default;
      transition: filter var(--transition);
    }
    .header__logo.flash {
      filter: drop-shadow(0 0 8px var(--amber));
    }
    .header__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .header__sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .header__version {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; gap: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .tab-btn {
      flex: 1; padding: 8px 4px;
      background: none; border: none;
      color: var(--text-dim); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font);
      border-bottom: 2px solid transparent;
      transition: color var(--transition);
      letter-spacing: 0.02em;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active {
      color: var(--amber);
      border-bottom-color: var(--amber);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Dev mode ── */
    body:not(.dev-mode) .dev-only { display: none; }

    body.dev-mode .header__sub::after {
      content: ' / dev';
      color: var(--amber-dim);
    }

    /* ── Sections ── */
    .section {
      padding: 10px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
    }
    .section__label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      font-weight: 500;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
    }
    .toggle-row__label { font-size: 13px; font-weight: 500; }

    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--border); border-radius: 22px;
      transition: background var(--transition);
    }
    .slider:before {
      content: ''; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: var(--text-dim); border-radius: 50%;
      transition: transform var(--transition), background var(--transition);
    }
    input:checked + .slider { background: var(--amber); }
    input:checked + .slider:before { transform: translateX(18px); background: var(--bg-deep); }

    /* ── Style controls ── */
    .style-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .style-row .section__label { flex: 0 0 60px; margin-bottom: 0; }
    .style-row input[type="range"] {
      flex: 1; accent-color: var(--amber); height: 4px;
    }
    .style-row .style-value {
      flex: 0 0 36px; text-align: right;
      font-size: 11px; color: var(--text-dim);
    }
    .style-row input[type="color"] {
      width: 28px; height: 22px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; cursor: pointer; padding: 0;
    }
    .style-row select {
      flex: 1; padding: 4px 8px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-deep); color: var(--text-primary);
      font-size: 12px; font-family: var(--font); outline: none;
      transition: border-color var(--transition);
    }
    .style-row select:focus { border-color: var(--amber-dim); }
    .style-row select option { background: var(--bg-deep); }
    .style-reset {
      background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 2px 6px; cursor: pointer;
      font-size: 10px; color: var(--text-dim); font-family: var(--font);
      transition: color var(--transition), border-color var(--transition);
    }
    .style-reset:hover { color: var(--text-primary); border-color: var(--text-dim); }

    /* ── Drop zone (dev) ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 16px; text-align: center;
      font-size: 13px; color: var(--text-dim);
      margin-bottom: 10px; cursor: pointer;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }
    .drop-zone:hover { border-color: var(--text-dim); color: var(--text-secondary); }
    .drop-zone.dragover {
      border-color: var(--amber);
      background: var(--amber-glow);
      color: var(--amber);
    }
    .drop-zone.loading {
      border-color: var(--blue); color: var(--blue);
      pointer-events: none;
    }
    .drop-zone.success { border-color: var(--amber); color: var(--amber); }
    .drop-zone.error { border-color: var(--red); color: var(--red); }

    /* ── Site link ── */
    .site-link {
      display: block; text-align: center;
      margin-top: 10px; padding: 8px;
      font-size: 12px; font-weight: 500; font-family: var(--font);
      color: var(--amber);
      text-decoration: none;
      border: 1px solid rgba(232, 168, 40, 0.2);
      border-radius: var(--radius-lg);
      transition: background var(--transition), border-color var(--transition);
    }
    .site-link:hover {
      background: var(--amber-glow);
      border-color: rgba(232, 168, 40, 0.35);
    }

    /* ── Queue (dev) ── */
    .queue-section {
      padding: 10px 12px;
      background: rgba(232, 168, 40, 0.04);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      border: 1px solid rgba(232, 168, 40, 0.1);
    }
    .queue-section .section__label { color: var(--amber-dim); }
    .queue-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; font-size: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .queue-item:last-child { border-bottom: none; }
    .queue-status {
      font-size: 10px; font-weight: 600; padding: 2px 6px;
      border-radius: 2px; text-transform: uppercase; white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .queue-status.pending { background: rgba(232, 168, 40, 0.15); color: var(--amber); }
    .queue-status.running { background: rgba(77, 166, 255, 0.15); color: var(--blue); }
    .queue-title {
      flex: 1; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: var(--text-secondary);
    }
    .queue-progress { color: var(--text-dim); font-size: 11px; white-space: nowrap; }

    /* ── Hint ── */
    .hint {
      font-size: 11px; color: var(--text-dim); line-height: 1.5;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border-subtle);
    }

    /* ── Settings (dev) ── */
    .provider-options { display: flex; flex-direction: column; gap: 4px; }
    .provider-option {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; cursor: pointer;
    }
    .provider-option input { accent-color: var(--amber); }
    .hint-text { color: var(--text-dim); font-size: 11px; }

    .key-row { display: flex; gap: 4px; }
    .key-input {
      flex: 1; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-deep); color: var(--text-primary);
      font-size: 12px; font-family: var(--font); outline: none;
      transition: border-color var(--transition);
    }
    .key-input:focus { border-color: var(--amber-dim); }
    .key-toggle {
      background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3px 8px; cursor: pointer; font-size: 13px;
      transition: border-color var(--transition);
    }
    .key-toggle:hover { border-color: var(--text-dim); }
    .key-warning { font-size: 11px; color: #e8a828; margin-top: 4px; }
    .label-link { color: var(--amber); text-decoration: none; }
    .label-link:hover { text-decoration: underline; }

    .model-select {
      width: 100%; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-deep); color: var(--text-primary);
      font-size: 12px; font-family: var(--font); outline: none;
      transition: border-color var(--transition);
    }
    .model-select:focus { border-color: var(--amber-dim); }
    .model-select option { background: var(--bg-deep); }


    /* ── Target language selector ── */
    .lang-select {
        width: 100%; padding: 6px 10px;
        border: 1px solid var(--border); border-radius: var(--radius);
        background: var(--bg-deep); color: var(--text-primary);
        font-size: 13px; font-family: var(--font); outline: none;
        transition: border-color var(--transition);
    }
    .lang-select:focus { border-color: var(--amber-dim); }
    .lang-select option { background: var(--bg-deep); }
    .popup-footer { padding: 10px 16px; text-align: center; font-size: 11px; color: #666; border-top: 1px solid var(--border); margin-top: 8px; }
    .popup-footer a { color: #888; text-decoration: none; }
    .popup-footer a:hover { color: var(--amber); }

  </style>
</head>
<body>
  <!-- ── Header ── -->
  <div class="header">
    <svg class="header__logo" id="headerLogo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" rx="6" fill="#141414"/><rect x="7" y="12" width="12" height="1" rx="0.5" fill="#999"/><rect x="7" y="17" width="18" height="2" rx="1" fill="#e8a828"/></svg>
    <div>
      <div class="header__title" data-i18n="headerTitle"></div>
      <div class="header__sub" data-i18n="headerSub"></div>
    </div>
    <div class="header__version" id="ext-version"></div>
  </div>

  <!-- ── Tab bar ── -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="subtitles" data-i18n="tabSubtitles"></button>
    <button class="tab-btn" data-tab="api" data-i18n="tabApi" id="tabBtnApi"></button>
    <button class="tab-btn dev-only" data-tab="dev" data-i18n="tabDev"></button>
  </div>

  <!-- ═══ Tab 1: Subtitles ═══ -->
  <div class="tab-pane active" id="tab-subtitles">
    <!-- Account block (placeholder — real auth in separate phase) -->
    <div id="accountBlock" class="section" style="margin-bottom: 8px; display: none;">
      <div id="accountNotLoggedIn">
        <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 6px;" data-i18n="accountSignInHint"></div>
        <div style="display: flex; gap: 6px; align-items: center;">
          <input type="email" id="accountEmail" placeholder="your@email.com" data-i18n-placeholder="accountEmailPlaceholder"
            style="flex: 1; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-primary); padding: 5px 8px; border-radius: var(--radius); font-size: 12px; font-family: var(--font);">
          <button id="accountSignIn" class="site-link" style="margin: 0; padding: 5px 12px; font-size: 12px; white-space: nowrap;" data-i18n="accountSignIn"></button>
        </div>
        <div style="font-size: 11px; color: var(--text-dim); margin-top: 6px;">
          <span data-i18n="accountOrApiKey"></span> <a href="#" id="accountGoToApi" style="color: var(--amber);" data-i18n="tabApi"></a>
        </div>
      </div>
      <div id="accountMagicLinkSent" style="display: none;">
        <div style="font-size: 12px; color: var(--text-dim);" data-i18n="accountCheckEmail"></div>
        <div style="font-size: 11px; color: var(--text-dim); margin-top: 6px;">
          <a href="#" id="accountResend" style="color: var(--amber); display: none;" data-i18n="accountResend"></a>
          <span id="accountResendTimer" style="color: var(--text-dim);"></span>
        </div>
      </div>
      <div id="accountLoggedIn" style="display: none;">
        <div style="display: flex; align-items: center; gap: 6px;">
          <span id="accountEmailDisplay" style="font-size: 12px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;"></span>
          <a href="#" id="accountLogout" title="" data-i18n-title="accountLogout" style="color: var(--text-dim); font-size: 13px; text-decoration: none; flex-shrink: 0; line-height: 1; opacity: 0.6;">&#x2715;</a>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin-top: 2px;">
          <span id="accountPlanBadge" style="color: var(--amber);"></span>
          <a href="#" id="accountAction" target="_blank" style="color: var(--amber); font-size: 11px;"></a>
        </div>
        <div id="accountQuotaBar" style="margin: 6px 0 2px; background: var(--border); height: 4px; border-radius: 2px;">
          <div id="accountQuotaFill" style="width: 0%; background: var(--amber); height: 100%; border-radius: 2px;"></div>
        </div>
        <div id="accountQuotaText" style="font-size: 11px; color: var(--text-dim);"></div>
        <div id="accountQuotaExhausted" style="display: none; font-size: 11px; color: var(--red); margin-top: 4px;"></div>
        <div id="accountQuotaResets" style="display: none; font-size: 10px; color: var(--text-dim); margin-top: 2px;"></div>
        <div id="accountUseOwnKey" style="display: none; font-size: 11px; margin-top: 4px;">
          <a href="#" id="accountUseOwnKeyLink" style="color: var(--amber);" data-i18n="accountUseOwnKey"></a>
        </div>
      </div>
      <div id="accountByok" style="display: none;">
        <div style="font-size: 12px; color: var(--text-dim);" data-i18n="accountUsingOwnKey"></div>
        <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">
          <a href="#" id="accountByokSignIn" style="color: var(--amber);" data-i18n="accountSignInForFree"></a>
        </div>
      </div>
    </div>

    <!-- Per-site toggle -->
    <div id="siteToggleRow" class="toggle-row" style="display:none">
      <span id="siteToggleLabel" class="toggle-row__label" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap"></span>
      <label class="switch">
        <input type="checkbox" id="siteToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="section" id="targetLangSection">
        <div class="section__label" data-i18n="labelTargetLang"></div>
        <select id="targetLangSelect" class="lang-select"></select>
    </div>

    <div class="section">
      <div class="section__label" data-i18n="labelSubtitleStyle"></div>
      <div class="style-row">
        <div class="section__label" data-i18n="labelSize"></div>
        <input type="range" id="styleFontSize" min="12" max="48" value="12" step="2">
        <span class="style-value" id="styleFontSizeVal" data-i18n="fontSizeAuto"></span>
      </div>
      <div class="style-row">
        <div class="section__label" data-i18n="labelColor"></div>
        <input type="color" id="styleColor" value="#ffffff">
        <button class="style-reset" id="styleColorReset" data-i18n="labelReset"></button>
      </div>
      <div class="style-row">
        <div class="section__label" data-i18n="labelBackground"></div>
        <input type="range" id="styleBgOpacity" min="0" max="100" value="85" step="5">
        <span class="style-value" id="styleBgOpacityVal">85%</span>
      </div>
      <div class="style-row">
        <div class="section__label" data-i18n="labelPosition"></div>
        <select id="stylePosition">
          <option value="" data-i18n="labelAuto"></option>
          <option value="bottom" data-i18n="labelBottom"></option>
          <option value="top" data-i18n="labelTop"></option>
        </select>
      </div>
      <div class="toggle-row" style="margin-top: 6px;">
        <span class="section__label" data-i18n="labelHideSDH"></span>
        <label class="switch"><input type="checkbox" id="toggleHideSDH"><span class="slider"></span></label>
      </div>
    </div>

    <div class="hint" data-i18n="hintOpenVideo"></div>
  </div>

  <!-- ═══ Tab 2: API ═══ -->
  <div class="tab-pane" id="tab-api">
    <!-- apiHintBanner hidden until managed mode (Free/Pro) is ready -->
    <div id="apiHintBanner" style="font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-bottom: 10px; display: none;"></div>

    <div class="section" id="apiKeySection">
      <div class="section__label" id="apiKeyLabel"></div>
      <div class="key-row">
        <input type="password" id="apiKeyInput" data-i18n-placeholder="placeholderApiKey" class="key-input">
        <button id="toggleKey" class="key-toggle" data-i18n-title="tooltipToggleKey">&#128065;</button>
      </div>
      <div id="apiKeyWarning" class="key-warning" style="display:none"></div>
    </div>

    <div class="section">
      <div class="section__label" data-i18n="labelModel"></div>
      <input type="text" id="modelInput" data-i18n-placeholder="placeholderModel"
        style="width: 100%; padding: 5px 8px; background: var(--bg-deep); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; font-family: var(--font); box-sizing: border-box;">
      <div style="margin-top: 4px;">
        <a href="https://podstr.cc/en/models/" target="_blank" id="modelHelpLink" style="color: var(--amber); font-size: 11px; text-decoration: none;" data-i18n="modelHelpLink"></a>
      </div>
    </div>

    <div style="font-size: 11px; color: var(--text-dim); margin-top: 8px; line-height: 1.4; padding: 6px 8px; background: rgba(255,180,0,0.08); border-radius: var(--radius);">
      <span data-i18n="apiPaymentHint"></span>
      <a href="https://podstr.cc/en/models/" target="_blank" id="apiSetupGuideLink" style="color: var(--amber); text-decoration: none; white-space: nowrap;" data-i18n="apiSetupGuide"></a>
    </div>
  </div>

  <!-- ═══ Tab 3: Dev (dev only) ═══ -->
  <div class="tab-pane" id="tab-dev">
    <div class="drop-zone" id="dropZone" data-i18n="dropZoneDefault"></div>

    <div class="queue-section" id="queueSection" style="display:none">
      <div class="section__label" data-i18n="labelQueue"></div>
      <div id="queueList"></div>
    </div>
    <div class="section">
      <div class="section__label" data-i18n="labelProvider"></div>
      <div class="provider-options">
        <label class="provider-option">
          <input type="radio" name="provider" value="openrouter" checked>
          <span data-i18n="providerApiKey"></span>
        </label>
        <label class="provider-option">
          <input type="radio" name="provider" value="claude-cli">
          <span>Claude CLI <span class="hint-text" data-i18n="providerClaudeCliHint"></span></span>
        </label>
      </div>
    </div>

  </div>

  <!-- ── Footer ── -->
  <div class="popup-footer">
    <a href="https://podstr.cc/en/welcome/" target="_blank" id="footerHelp" data-i18n="footerHelp"></a>
    <span style="color: var(--text-dim);"> · </span>
    <a href="https://podstr.cc/en/terms/" target="_blank" data-i18n="footerTerms"></a>
    <span style="color: var(--text-dim);"> · </span>
    <a href="https://podstr.cc/en/privacy/" target="_blank" data-i18n="footerPrivacy"></a>
  </div>

  <script src="providers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
