server {
    listen 80;
    server_name podstr.cc;
    root /opt/site/out;
    charset utf-8;

    # Корень → /ru/
    location = / {
        return 302 /ru/;
    }

    # API → Python backend
    location ~ ^/(cache|queue|translations|wishlist|ping|extension\.zip) {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Статические ассеты — кеш 1 год
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML-страницы — без кеша (регенерируются)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-cache";
    }

    # Ошибка 404
    error_page 404 /ru/index.html;
}
